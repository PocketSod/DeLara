<svg width="280" height="88" viewBox="0 0 280 88" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ── Mark (lightbulb) ── -->
  <!-- Light rays -->
  <line x1="34" y1="1" x2="34" y2="6"   stroke="#C9993A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="11" x2="19" y2="17" stroke="#C9993A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="54" y1="11" x2="49" y2="17" stroke="#C9993A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="2"  y1="30" x2="7"  y2="30" stroke="#C9993A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="66" y1="30" x2="61" y2="30" stroke="#C9993A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bulb glass -->
  <path d="M 25,60 C 20,54 8,46 8,30 C 8,14 20,5 34,5 C 48,5 60,14 60,30 C 60,46 48,54 43,60"
        stroke="#C85C2A" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Inner gold glow -->
  <ellipse cx="34" cy="30" rx="8" ry="10" fill="#C9993A" opacity="0.40"/>
  <!-- Socket bands -->
  <rect x="24" y="61" width="20" height="5" rx="0.5" fill="#C85C2A"/>
  <rect x="24" y="68" width="20" height="5" rx="0.5" fill="#C85C2A"/>
  <!-- Gold base cap -->
  <rect x="21" y="74" width="26" height="6" rx="3" fill="#C9993A"/>

  <!-- ── Wordmark ── -->
  <text x="86" y="58"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="52"
    font-weight="500"
    letter-spacing="-0.5"
    fill="#211510">De</text>
  <text x="138" y="58"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="52"
    font-weight="500"
    fill="#C9993A">L</text>
  <text x="156" y="58"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="52"
    font-weight="500"
    letter-spacing="-0.5"
    fill="#211510">ara</text>

  <!-- "CONSULTING LLC" -->
  <text x="88" y="76"
    font-family="'Montserrat', Arial, sans-serif"
    font-size="9"
    font-weight="600"
    letter-spacing="4"
    fill="#9A6B52">CONSULTING LLC</text>
</svg>
